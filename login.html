<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="view-transition" content="same-origin">
    <title>Login - AUTUMN 2026 | College Fest</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lucide Icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
      /* Shared CSS injected for single-file functionality */
      @keyframes fadeInSlide {
          from { opacity: 0; transform: translateY(10px); }
          to { opacity: 1; transform: translateY(0); }
      }
      @keyframes popHeart {
          0% { transform: scale(0.5); opacity: 1; }
          50% { transform: scale(1.2); opacity: 1; }
          100% { transform: scale(1); opacity: 0; }
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: rgba(244,63,94,0.5); }
      
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      .leaf { position: absolute; top: -10%; animation: fall linear infinite; pointer-events: none;}
      @keyframes fall {
          0% { transform: translate(0, 0) rotate(0deg); opacity: 0; }
          10% { opacity: 1; }
          90% { opacity: 1; }
          100% { transform: translate(100px, 100vh) rotate(360deg); opacity: 0; }
      }
    </style>
  </head>
  <body class="relative bg-black text-white font-sans">

    <!-- ================= AMBIENT BACKGROUND ================= -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
      <div class="absolute inset-0 opacity-40">
        <div class="absolute top-[20%] left-[10%] w-[300px] md:w-[500px] h-[300px] md:h-[500px] bg-rose-900/20 rounded-full blur-[100px] md:blur-[120px]"></div>
        <div class="absolute bottom-[10%] right-[10%] w-[400px] md:w-[600px] h-[400px] md:h-[600px] bg-amber-900/10 rounded-full blur-[120px] md:blur-[150px]"></div>
        <div class="absolute top-[50%] left-[50%] -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[radial-gradient(circle_at_center,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:24px_24px] opacity-20"></div>
      </div>
      <div id="heroLeaves" class="absolute inset-0"></div>
    </div>

    <!-- ================= NAVBAR (Minimal for Login) ================= -->
    <nav class="fixed top-0 w-full z-50 bg-black/60 backdrop-blur-xl border-b border-white/5">
      <div class="max-w-7xl mx-auto px-4 md:px-6 h-20 flex items-center justify-between">
        <!-- Logo -->
        <a href="index.html" class="text-2xl font-black font-serif tracking-tighter text-white cursor-pointer flex items-center gap-2 group z-20">
          <i data-lucide="leaf" class="w-8 h-8 text-rose-500 transition-transform group-hover:scale-110"></i>
          AUTUMN
        </a>
      </div>
    </nav>

    <!-- ================= MAIN CONTENT ================= -->
    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 pt-28 pb-20 min-h-[calc(100vh-80px)] animate-[fadeInSlide_0.5s_ease-out]">
      <section id="login">
        <div class="min-h-[70vh] flex items-center justify-center">
          <!-- Auth Box -->
          <div class="w-full max-w-md bg-zinc-900/60 backdrop-blur-2xl border border-white/10 rounded-3xl p-6 md:p-8 shadow-2xl relative overflow-hidden">
            <div class="absolute -top-32 -right-32 w-64 h-64 bg-rose-600/20 rounded-full blur-[100px]"></div>

            <div class="text-center mb-8 relative z-10">
              <h2 class="text-2xl md:text-3xl font-black text-white font-serif tracking-tight mb-2">Welcome</h2>
              <p class="text-zinc-400 text-xs md:text-sm" id="auth-subtitle">Sign in or create an account to proceed.</p>
            </div>

            <!-- Auth Tabs -->
            <div class="flex bg-black/40 p-1 rounded-xl mb-6 relative z-10">
              <button onclick="toggleAuthMode(true)" id="tab-login" class="flex-1 py-2 rounded-lg text-xs md:text-sm font-bold transition bg-zinc-800 text-white shadow">Login</button>
              <button onclick="toggleAuthMode(false)" id="tab-signup" class="flex-1 py-2 rounded-lg text-xs md:text-sm font-bold transition text-zinc-500 hover:text-zinc-300">Sign Up</button>
            </div>

            <form onsubmit="event.preventDefault(); handleLogin();" class="space-y-4 relative z-10">
              <div id="signup-fields" class="hidden space-y-4 max-h-[40vh] overflow-y-auto w-full no-scrollbar px-1">
                <div>
                  <label class="block text-[10px] uppercase tracking-wider text-zinc-500 font-bold mb-1 ml-1">Full Name</label>
                  <input type="text" id="auth-name" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-rose-500 transition">
                </div>
                <div>
                  <label class="block text-[10px] uppercase tracking-wider text-zinc-500 font-bold mb-1 ml-1">Gender</label>
                  <select id="auth-gender" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-rose-500 transition appearance-none">
                    <option value="" disabled selected>Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                  </select>
                </div>
              </div>

              <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-500 font-bold mb-1 ml-1">Email</label>
                <input type="email" id="auth-email" placeholder="Email Address" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-rose-500 transition" required>
              </div>
              <div>
                <label class="block text-[10px] uppercase tracking-wider text-zinc-500 font-bold mb-1 ml-1">Password</label>
                <input type="password" id="auth-password" placeholder="Password" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-rose-500 transition" required>
              </div>

              <div id="forgot-pass-link" class="flex justify-end">
                <button type="button" class="text-xs text-rose-400 hover:text-rose-300 transition" onclick="showMessage('Password reset link sent to your email.')">Forgot Password?</button>
              </div>

              <button type="submit" id="auth-submit-btn" class="w-full py-3 sm:py-3.5 mt-2 rounded-xl bg-rose-600 hover:bg-rose-500 text-white font-bold transition shadow-[0_0_20px_rgba(225,29,72,0.3)] text-sm sm:text-base">
                Sign In
              </button>
            </form>
          </div>
        </div>
      </section>
    </main>

    <!-- ================= FOOTER ================= -->
    <footer class="relative z-10 bg-[#050505] border-t border-rose-900/30 pt-12 sm:pt-16 pb-8 mt-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 flex flex-col items-center gap-6 sm:gap-8">
        <div class="text-2xl sm:text-3xl font-black font-serif tracking-tighter text-white flex items-center gap-2 sm:gap-3">
          <i data-lucide="leaf" class="text-rose-500 w-6 h-6 sm:w-8 sm:h-8"></i>
          AUTUMN
        </div>
        <div class="text-center flex flex-col gap-2">
          <p class="text-[10px] sm:text-xs text-zinc-600 font-medium tracking-wide">© 2026 AUTUMN Fest · All rights reserved · College Campus</p>
        </div>
      </div>
    </footer>

    <!-- Toast Message UI needed by JS -->
    <div id="toast" class="fixed bottom-4 right-4 bg-zinc-800 border border-zinc-700 text-white px-4 sm:px-6 py-2.5 sm:py-3 rounded-xl shadow-2xl transform translate-y-20 opacity-0 transition-all duration-300 z-[200] flex items-center gap-2 max-w-[calc(100vw-2rem)] break-words">
        <i data-lucide="check-circle" class="text-emerald-500 w-4 h-4 sm:w-5 sm:h-5 shrink-0"></i>
        <span id="toastMsg" class="text-xs sm:text-sm font-medium">Message</span>
    </div>

    <script src="shared.js"></script>
    <script src="login.js"></script>
  </body>
</html>
